name: Signin verification

on:
  push:
    branches: [ feat/gc-signin-rewrite, main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-a11y:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y npm

      - name: Install pip deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Start app (uvicorn)
        run: |
          nohup python -m uvicorn app.main:create_app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run pytest
        run: python -m pytest -q

      - name: Install pa11y
        run: |
          sudo npm install -g pa11y

      - name: Run a11y check for signin page
        run: |
          pa11y http://localhost:8000/auth/login --reporter cli

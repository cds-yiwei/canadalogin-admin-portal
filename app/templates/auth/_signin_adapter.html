{# Adapter wrapping GC Design System signin pieces to provide app-level hooks and consistent props #}
<section aria-labelledby="signin-title">
  <gcds-heading tag="h1" id="signin-title">{{ t('login.title') }}</gcds-heading>
  <p class="muted">{{ t('login.subtitle') }}</p>
  <form class="gcds-form" method="get" action="/auth/oidc/start" role="form" aria-describedby="login-notice">
    <p id="login-notice" class="muted">{{ t('login.notice') }}</p>
    {# Use gcds-button for primary action; adapter centralizes any app-specific attributes #}
    <gcds-button type="submit" id="signin-cta">{{ t('login.cta') }}</gcds-button>
    <!-- Hidden native submit button for accessibility tools that don't recognize custom elements -->
    <button type="submit" aria-hidden="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);border:0;padding:0;margin:-1px;">{{ t('login.cta') }}</button>
  </form>
</section>

{% extends "base.html" %}
{% block content %}
<section>
  <div class="panel-header">
    <h1>{{ t('login.title') }}</h1>
    <p class="muted">{{ t('login.subtitle') }}</p>
  </div>
  <div class="panel-body">
    <form class="stack" method="get" action="/auth/oidc/start">
      <p class="muted">{{ t('login.notice') }}</p>
      <gcds-button type="submit">
        {{ t('login.cta') }}
      </gcds-button>
    </form>
  </div>
</section>
{% endblock %}

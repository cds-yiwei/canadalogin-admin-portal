<form hx-post="/applications/{{ app_id }}/edit/application-info" hx-swap="outerHTML">
  <div>
    <label for="name">{{ t('applications.detail.labels.name') }}</label>
    <input id="name" name="name" type="text" value="{{ application_payload.name or '' }}">
  </div>
  <div>
    <label for="description">{{ t('applications.detail.labels.description') }}</label>
    <textarea id="description" name="description">{{ application_payload.description or '' }}</textarea>
  </div>
  <div>
    <label for="companyName">{{ t('applications.detail.labels.company_name') }}</label>
    <input id="companyName" name="companyName" type="text" value="{{ application_payload.providers.saml.properties.companyName if application_payload and application_payload.providers and application_payload.providers.saml and application_payload.providers.saml.properties and application_payload.providers.saml.properties.companyName else '' }}">
  </div>
  <div>
    <label for="applicationUrl">{{ t('applications.detail.labels.application_url') }}</label>
    <input id="applicationUrl" name="applicationUrl" type="text" value="{{ application_payload.providers.oidc.applicationUrl if application_payload and application_payload.providers and application_payload.providers.oidc else '' }}">
  </div>
  <div class="form-actions">
    <gcds-button type="submit">{{ t('common.save') }}</gcds-button>
    <gcds-button type="button" button-role="secondary" hx-get="/fragments/application-info?app_id={{ app_id | urlencode }}" hx-swap="outerHTML">{{ t('common.cancel') }}</gcds-button>
  </div>
</form>

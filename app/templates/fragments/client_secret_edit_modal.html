<div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="client-secret-edit-title">
  <div class="modal-header" style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
    <div class="gcds-stack" style="gap:6px;">
      <gcds-heading tag="h3" class="modal-title" id="client-secret-edit-title">
        {{ t('applications.detail.client_secret_edit_modal.title') }}
      </gcds-heading>
    </div>
    <button class="modal-close" data-modal-close aria-label="{{ t('applications.detail.client_secret_edit_modal.close') }}">
      ×
    </button>
  </div>
  <div class="modal-body">
    <form
      id="client-secret-edit-form"
      class="gcds-stack"
      style="gap:16px;"
      hx-post="/fragments/client-secret/edit"
      hx-swap="none"
      x-data="{ action: 'rotate' }"
    >
      <input type="hidden" name="client_id" value="{{ client_id }}" />
      <fieldset class="gcds-stack" style="gap:12px;">
        <label class="gcds-stack" style="gap:8px;">
          <div style="display:flex; gap:10px; align-items:flex-start;">
            <input type="radio" name="action" value="regenerate" x-model="action" />
            <gcds-details details-title="{{ t('applications.detail.client_secret_edit_modal.regenerate_title') }}" >
              {{ t('applications.detail.client_secret_edit_modal.regenerate_help') }}
            </gcds-details>
          </div>
        </label>
        <label class="gcds-stack" style="gap:8px;">
          <div style="display:flex; gap:10px; align-items:flex-start;">
            <input type="radio" name="action" value="rotate" x-model="action" checked />
            <gcds-details details-title="{{ t('applications.detail.client_secret_edit_modal.rotate_title') }}" >
              {{ t('applications.detail.client_secret_edit_modal.rotate_help') }}
            </gcds-details>
        </label>
      </fieldset>

      <div class="gcds-stack" style="gap:12px;" x-show="action === 'rotate'" x-cloak>
        <label class="gcds-stack" style="gap:6px;">
          <gcds-text>{{ t('applications.detail.client_secret_edit_modal.description_label') }}</gcds-text>
          <input
            name="description"
            type="text"
            class="gcds-input"
            placeholder="for ex. Q1 2026"
            x-bind:required="action === 'rotate'"
          />
        </label>
        <label class="gcds-stack" style="gap:6px;">
          <gcds-text>{{ t('applications.detail.client_secret_edit_modal.expire_label') }}</gcds-text>
          <input
            name="expire_date"
            type="date"
            class="gcds-input"
            min="{{ min_expiry_date }}"
            max="{{ max_expiry_date }}"
            x-bind:required="action === 'rotate'"
          />
          <gcds-text class="muted">{{ t('applications.detail.client_secret_edit_modal.expire_help') }}</gcds-text>
        </label>
      </div>
    </form>
  </div>
  <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:12px;">
    <gcds-button type="button" variant="secondary" data-modal-close>
      {{ t('common.cancel') }}
    </gcds-button>
    <gcds-button
      type="submit"
      form="client-secret-edit-form"
      hx-post="/fragments/client-secret/edit"
      hx-trigger="click"
      hx-include="#client-secret-edit-form"
      hx-swap="none"
    >
      {{ t('common.save') }}
    </gcds-button>
  </div>
</div>

<form hx-post="/fragments/applications/{{ app_id }}/edit/oidc-settings" hx-swap="none">
  <div>
    <label for="redirectUris">{{ t('applications.detail.labels.redirect_url') }}</label>
    <textarea id="redirectUris" name="redirectUris" placeholder="Enter one URI per line">{% if application_payload and application_payload.providers and application_payload.providers.oidc and application_payload.providers.oidc.properties and application_payload.providers.oidc.properties.redirectUris %}{% for uri in application_payload.providers.oidc.properties.redirectUris %}{{ uri }}
{% endfor %}{% endif %}</textarea>
    {% if errors and errors.redirectUris %}
      <div class="error">{{ errors.redirectUris }}</div>
    {% endif %}
  </div>
  <div>
    <label>
      <input type="checkbox" name="requirePkceVerification" value="true" {% if application_payload and application_payload.providers and application_payload.providers.oidc and (application_payload.providers.oidc.requirePkceVerification == true or application_payload.providers.oidc.requirePkceVerification == 'true') %}checked{% endif %}>
      {{ t('applications.detail.labels.pkce_enabled') }}
    </label>
  </div>
  <div class="form-actions">
    <gcds-button type="submit">{{ t('common.save') }}</gcds-button>
    <gcds-button type="button" button-role="secondary" hx-get="/fragments/oidc-settings?app_id={{ app_id | urlencode }}" hx-swap="outerHTML">{{ t('common.cancel') }}</gcds-button>
  </div>
</form>

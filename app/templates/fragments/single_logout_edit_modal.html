<div class='modal-panel' role='dialog' aria-modal='true'>
  <div class='modal-header' style='display:flex; align-items:center; gap:12px;'>
    <h3 class='modal-title'>{{ t('applications.create.sections.single_logout') }}</h3>
    <button class='modal-close' data-modal-close aria-label='Close'>×</button>
  </div>
  <div class='modal-body'>
    <form class='gcds-stack' style='gap:12px;' hx-post='/fragments/applications/{{ app_id }}/edit/single-logout' hx-swap='none'>
      <label class='gcds-stack' style='gap:6px;'>
        <span>{{ t('applications.detail.labels.logout_method') }}</span>
        <select name='logoutOption' class='gcds-select'>
          <option value='none' {% if not (logout_option) or logout_option == 'none' %}selected{% endif %}>{{ t('applications.create.logout_method.none') }}</option>
          <option value='front_channel' {% if logout_option == 'front_channel' %}selected{% endif %}>{{ t('applications.create.logout_method.front_channel') }}</option>
          <option value='back_channel' {% if logout_option == 'back_channel' %}selected{% endif %}>{{ t('applications.create.logout_method.back_channel') }}</option>
        </select>
        {% if errors and errors.logoutOption %}<div class='error'>{{ errors.logoutOption }}</div>{% endif %}
      </label>
      <label class='gcds-stack' style='gap:6px;'>
        <span>{{ t('applications.detail.labels.logout_uri') }}</span>
        <input name='logoutURI' type='text' class='gcds-input' value='{% if application_payload and application_payload.providers and application_payload.providers.oidc and application_payload.providers.oidc.properties and application_payload.providers.oidc.properties.additionalConfig and application_payload.providers.oidc.properties.additionalConfig.logoutURI %}{{ application_payload.providers.oidc.properties.additionalConfig.logoutURI }}{% endif %}' />
        {% if errors and errors.logoutURI %}<div class='error'>{{ errors.logoutURI }}</div>{% endif %}
      </label>
      <label class='gcds-stack' style='gap:6px;'>
        <span>{{ t('applications.detail.labels.post_logout_redirect_uris') }}</span>
        <textarea name='logoutRedirectURIs' rows='4' class='gcds-textarea' placeholder='Enter one URI per line'>{% if application_payload and application_payload.providers and application_payload.providers.oidc and application_payload.providers.oidc.properties and application_payload.providers.oidc.properties.additionalConfig and application_payload.providers.oidc.properties.additionalConfig.logoutRedirectURIs %}{% for uri in application_payload.providers.oidc.properties.additionalConfig.logoutRedirectURIs %}{{ uri }}
{% endfor %}{% endif %}</textarea>
        {% if errors and errors.logoutRedirectURIs %}<div class='error'>{{ errors.logoutRedirectURIs }}</div>{% endif %}
      </label>
      <div style='display:flex; gap:10px; justify-content:flex-end;'>
        <button type='button' class='btn secondary' data-modal-close>{{ t('common.cancel') }}</button>
        <button type='submit' class='btn'>{{ t('common.save') }}</button>
      </div>
    </form>
  </div>
</div>

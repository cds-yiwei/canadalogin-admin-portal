    <gcds-heading tag="h2">{{ t('group_management.search_modal_title') }}</gcds-heading>
    <button id="add-member-modal-close" aria-label="Close" style="background:none; border:none; font-size:24px; cursor:pointer;">×</button>
  </div>

  <div class="modal-body" style="padding:20px; gap:16px; display:flex; flex-direction:column;">
    <!-- Search Results -->
    <div id="modal-search-results" style="max-height:400px; overflow-y:auto; border:1px solid #ddd; border-radius:4px; padding:8px;">
      <!-- Search results are rendered here. Modal is only used to display results. -->

  </div>
</div>
